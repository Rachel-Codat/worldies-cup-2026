name: Refresh results

on:
  push:
    branches: [main]            # auto-deploy on every push to main
  schedule:
    # Every 5 min across the window WC2026 matches can be in play (UTC).
    # GitHub cron is best-effort and may drift/skip under load; offset minutes
    # off the :00/:05 boundary, the most-contended (and most-dropped) marks.
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 15-23 * * *'
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 0-7 * * *'
  workflow_dispatch: {}          # manual run from the Actions tab

# Deploy via the GitHub Actions Pages pipeline (no 10-builds/hour branch limit).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pull live results and rebuild site
        env:
          FD_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          bash build/refresh.sh
          mkdir -p _site
          cp index.html data.json _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
